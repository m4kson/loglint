name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    name: Go test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test ./...

  lint:
    name: golangci-lint (with loglint)
    runs-on: ubuntu-latest
    needs: test

    env:
      GOLANGCI_LINT_VERSION: v2.1.5
      GOWORK: off

    steps:
      - name: Checkout loglint
        uses: actions/checkout@v4
        with:
          path: loglint

      - name: Clone golangci-lint
        run: |
          git clone \
            --branch ${{ env.GOLANGCI_LINT_VERSION }} \
            --single-branch \
            --depth 1 \
            https://github.com/golangci/golangci-lint.git \
            golangci-lint-src

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build custom golangci-lint binary
        run: |
          PLUGIN_MODULE=$(cd loglint && go list -m)
          PLUGIN_PATH=$(pwd)/loglint

          cd golangci-lint-src

          # Подключаем плагин через replace — не нужно пушить тег
          go get "${PLUGIN_MODULE}@v0.0.0" || true
          go mod edit -replace "${PLUGIN_MODULE}=${PLUGIN_PATH}"
          go mod tidy

          # Импортируем side-effect пакет плагина (регистрирует анализатор)
          PLUGIN_IMPORT=$(cd "${PLUGIN_PATH}" && go list ./plugin/)
          printf '\npackage main\nimport _ "%s"\n' "${PLUGIN_IMPORT}" \
            > cmd/golangci-lint/plugin_loglint.go

          go build -o ../loglint/bin/custom-gcl ./cmd/golangci-lint/

      - name: Run custom golangci-lint
        working-directory: loglint
        run: |
          ./bin/custom-gcl run ./... --config=.golangci.yml