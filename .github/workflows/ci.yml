name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    name: Go test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test ./...

  lint:
    name: golangci-lint (with loglint)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.5

      - name: Ensure git is up to date
        run: |
          git --version || true
          sudo apt-get update
          sudo apt-get install -y git
          git --version

      - name: Build custom golangci-lint with loglint plugin
        run: |
          golangci-lint custom -v

      - name: Run golangci-lint (custom-gcl)
        env:
          # Отключаем workspace mode, чтобы не конфликтовать с modules-download-mode.
          GOWORK: off
        run: |
          ./bin/custom-gcl run ./... --config=.golangci.yml

